<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LabCore — Opening...</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, system-ui, sans-serif; background: #18181b; color: #fff;
      flex-direction: column; gap: 16px;
    }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; font-weight: 700; margin: 0; }
    p { font-size: 14px; color: #888; margin: 0; text-align: center; }
    a { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>LabCore</h1>
  <p id="status">Opening...</p>
  <script>
    // LabCore QR Scan Redirect
    // URL: https://calm-mushroom-0f00e1e03.2.azurestaticapps.net/SP-001002
    //
    // Strategy: save scan code in MULTIPLE places so the app can find it,
    // then redirect to the Power Apps URL.

    const APP_URL = 'https://apps.powerapps.com/play/e/349f8ea3-3c69-e1eb-9a63-1b599a274140/app/18848aa6-b9db-42e2-931a-a71550492bdf?tenantId=7cc6f684-1619-49fb-be6f-9a9d9afe38eb';

    const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');

    if (path) {
      let scanData;
      if (path.toUpperCase().startsWith('PAL-') || path.toUpperCase().startsWith('PAL')) {
        scanData = 'pallet:' + path;
        document.getElementById('status').textContent = 'Opening pallet ' + path + '...';
      } else {
        scanData = 'specimen:' + path;
        document.getElementById('status').textContent = 'Opening specimen ' + path + '...';
      }

      // Save in localStorage (works if same browser context)
      try { localStorage.setItem('labcore-scan', scanData); } catch(e) {}

      // Save in sessionStorage too
      try { sessionStorage.setItem('labcore-scan', scanData); } catch(e) {}

      // Use BroadcastChannel (works across tabs in same browser)
      try {
        const bc = new BroadcastChannel('labcore-scan');
        bc.postMessage(scanData);
        // Keep channel open briefly
        setTimeout(() => bc.close(), 5000);
      } catch(e) {}

      // Also save as a cookie (accessible across origins on same domain... but different domain here)
      try { document.cookie = 'labcore-scan=' + encodeURIComponent(scanData) + ';path=/;max-age=60'; } catch(e) {}

      // Redirect to the app
      setTimeout(function() {
        window.location.href = APP_URL;
      }, 300);
    } else {
      document.getElementById('status').innerHTML =
        'Scan a LabCore QR code to open a specimen or pallet.<br><br>' +
        '<a href="' + APP_URL + '">Open LabCore app</a>';
    }
  </script>
</body>
</html>
